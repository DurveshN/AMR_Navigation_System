name: amr_navigation
description: AMR Navigation System - Flutter mobile app for commanding a simulated mobile robot.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.9
  firebase_database: ^10.4.0
  firebase_core: ^2.24.0
  flutter_riverpod: ^2.4.9
  dio: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/map.svg
    - assets/map_fallback.png
    - assets/robot_icon.svg
